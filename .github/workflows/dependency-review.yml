name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only run on the upstream repo where Dependency graph is enabled.
    # Forks and repos without the feature enabled will skip this job
    # rather than fail with an unsupported-repository error.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        # continue-on-error prevents a missing Dependency graph feature
        # from blocking the PR — the step will be marked as a warning.
        continue-on-error: true
        with:
          fail-on-severity: high
          warn-only: false
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: always
